---
# 0058-storage-preflight.yml
# 企业级 CSI / 存储迁移前置检查。
# 当前阶段：仅检查与风险报告，不修改任何 PVC/PV/StorageClass。

- name: storage preflight - cluster checks
  hosts: localhost
  gather_facts: no
  tasks:
    - name: 检查 storage backend 配置
      assert:
        that:
          - storage_backend is defined
          - storage_backend in ['local-lvm', 'nfs', 'iscsi-san', 'rook-ceph']
        fail_msg: "storage_backend 必须是 local-lvm/nfs/iscsi-san/rook-ceph 之一。"
        success_msg: "storage backend 配置合法。"

    - name: 输出当前 storage backend
      debug:
        msg:
          - "storage_backend={{ storage_backend }}"
          - "当前阶段仅执行 preflight/risk-report，不修改任何存储资源。"

    - name: 检查 kubectl 是否存在
      stat:
        path: "{{ download_arch_dir }}/kubectl"
      register: kubectl_binary

    - name: 确认 kubectl 存在
      assert:
        that:
          - kubectl_binary.stat.exists
        fail_msg: "缺少 kubectl: {{ download_arch_dir }}/kubectl"
        success_msg: "kubectl 存在。"

    - name: 获取 StorageClass
      command: >
        {{ download_arch_dir }}/kubectl get sc
        --kubeconfig={{ local_cluster_config_dir }}/kubeconfig/admin.kubeconfig
      register: storageclass_output
      changed_when: false
      failed_when: false

    - name: 获取 PVC
      command: >
        {{ download_arch_dir }}/kubectl get pvc -A
        --kubeconfig={{ local_cluster_config_dir }}/kubeconfig/admin.kubeconfig
      register: pvc_output
      changed_when: false
      failed_when: false

    - name: 获取 PV
      command: >
        {{ download_arch_dir }}/kubectl get pv
        --kubeconfig={{ local_cluster_config_dir }}/kubeconfig/admin.kubeconfig
      register: pv_output
      changed_when: false
      failed_when: false

    - name: 获取 StatefulSet
      command: >
        {{ download_arch_dir }}/kubectl get sts -A
        --kubeconfig={{ local_cluster_config_dir }}/kubeconfig/admin.kubeconfig
      register: sts_output
      changed_when: false
      failed_when: false

    - name: 获取 VolumeAttachment
      command: >
        {{ download_arch_dir }}/kubectl get volumeattachment
        --kubeconfig={{ local_cluster_config_dir }}/kubeconfig/admin.kubeconfig
      register: volumeattachment_output
      changed_when: false
      failed_when: false

    - name: 输出存储风险报告
      debug:
        msg:
          - "===== StorageClass ====="
          - "{{ storageclass_output.stdout_lines | default([]) }}"
          - "===== PVC ====="
          - "{{ pvc_output.stdout_lines | default([]) }}"
          - "===== PV ====="
          - "{{ pv_output.stdout_lines | default([]) }}"
          - "===== StatefulSet ====="
          - "{{ sts_output.stdout_lines | default([]) }}"
          - "===== VolumeAttachment ====="
          - "{{ volumeattachment_output.stdout_lines | default([]) }}"

- name: storage preflight - iscsi checks
  hosts: kube_node
  gather_facts: no
  become: yes
  tasks:
    - name: 检查 open-iscsi
      shell: which iscsiadm
      register: iscsiadm_check
      changed_when: false
      failed_when: false
      when: storage_backend == 'iscsi-san'

    - name: 检查 multipath
      shell: which multipath
      register: multipath_check
      changed_when: false
      failed_when: false
      when: storage_backend == 'iscsi-san'

    - name: 输出 iSCSI preflight 结果
      debug:
        msg:
          - "iscsiadm={{ iscsiadm_check.rc | default('N/A') }}"
          - "multipath={{ multipath_check.rc | default('N/A') }}"
      when: storage_backend == 'iscsi-san'

- name: storage preflight - ceph checks
  hosts: storage
  gather_facts: no
  become: yes
  tasks:
    - name: 检查 Ceph OSD 磁盘变量
      debug:
        msg:
          - "ceph_osd_devices={{ ceph_osd_devices | default([]) }}"
      when: storage_backend == 'rook-ceph'
