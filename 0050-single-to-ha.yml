---
# 0050-single-to-ha.yml
# 单节点升级 HA 总入口。
# 当前版本执行 preflight 与 backup，不自动执行 etcd/control-plane/LB 扩容。

- import_playbook: 0050-single-to-ha-preflight.yml
- import_playbook: 0051-single-to-ha-backup.yml

- name: 单节点升级 HA - 第一阶段完成提示
  hosts: localhost
  gather_facts: no
  tasks:
    - name: 输出后续执行计划
      debug:
        msg:
          - "single-to-ha preflight 与 backup 已完成。"
          - "当前总入口不会自动修改 etcd 或控制面状态。"
          - "请人工确认 backup/single-to-ha/<timestamp>/ 下的 etcd snapshot、cluster-state 与 remote-pki 归档有效。"
          - "确认备份有效后，后续进入 0052-expand-etcd-members.yml、0053-renew-apiserver-cert-for-ha.yml、0054-expand-control-plane.yml、0055-enable-ha-lb.yml、0056-switch-kubeconfigs-to-vip.yml、0057-expand-workers.yml、0058-finalize-ha-migration.yml。"
