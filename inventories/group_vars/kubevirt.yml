---
# Optional KubeVirt virtualization extension defaults.
# KubeVirt is disabled by default and must be explicitly enabled.

kubevirt_enabled: false
kubevirt_namespace: kubevirt
kubevirt_version: v1.8.2
kubevirt_version_policy: pinned
kubevirt_allow_prerelease: false

# remote: install from configured release manifest URLs
# local: install from files/kubevirt/
kubevirt_manifest_source: remote
kubevirt_local_manifest_dir: files/kubevirt

kubevirt_operator_url: ""
kubevirt_cr_url: ""

kubevirt_require_kvm: true
kubevirt_enable_emulation: false
kubevirt_wait_ready: true
kubevirt_validate_storage: true
kubevirt_default_storage_class: ""

kubevirt_enable_cdi: false
kubevirt_cdi_namespace: cdi
kubevirt_cdi_version: v1.60.0
kubevirt_cdi_operator_url: ""
kubevirt_cdi_cr_url: ""

# virtctl is optional. Remote mode requires kubevirt_virtctl_url to be set explicitly.
kubevirt_install_virtctl: false
kubevirt_virtctl_source: remote
# remote | local
kubevirt_virtctl_url: ""
kubevirt_virtctl_local_path: "files/kubevirt/virtctl"
kubevirt_virtctl_install_path: /usr/local/bin/virtctl

# Smoke test is disabled by default.
# It uses an ephemeral containerDisk VM and does not create persistent PVCs.
kubevirt_enable_vm_smoke_test: false
kubevirt_smoke_test_namespace: kubevirt-smoke-test
kubevirt_smoke_test_vm_name: testvm-ephemeral
kubevirt_smoke_test_image: quay.io/kubevirt/cirros-container-disk-demo:latest
kubevirt_smoke_test_memory: 256Mi
kubevirt_smoke_test_cleanup: true
kubevirt_smoke_test_wait_timeout: 180s

# DataVolume smoke test is disabled by default.
# It validates CDI + CSI + PVC-backed VM workflow.
kubevirt_enable_datavolume_smoke_test: false
kubevirt_datavolume_test_namespace: kubevirt-datavolume-test
kubevirt_datavolume_test_vm_name: testvm-datavolume
kubevirt_datavolume_name: testdv-cirros
kubevirt_datavolume_size: 1Gi
kubevirt_datavolume_storage_class: ""
kubevirt_datavolume_source_url: ""
kubevirt_datavolume_wait_timeout: 600s
kubevirt_datavolume_cleanup: true
