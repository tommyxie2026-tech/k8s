# inventories/hosts.yml
# 旗舰生产级高可用 Kubernetes 二进制部署主机清单与集群级全局变量

all:
  children:
    # 专属 etcd 节点组（解耦控制面，保障 SSD 高速存储以防 I/O 脑裂）
    etcd:
      hosts:
        etcd-01:
          ansible_host: 192.168.1.21
          etcd_name: etcd-01
        etcd-02:
          ansible_host: 192.168.1.22
          etcd_name: etcd-02
        etcd-03:
          ansible_host: 192.168.1.23
          etcd_name: etcd-03

    # Kubernetes 控制面组 (部署负载均衡、API Server、KCM 与 Scheduler)
    kube_master:
      hosts:
        master-01:
          ansible_host: 192.168.1.11
          keepalived_state: MASTER
          keepalived_priority: 100
        master-02:
          ansible_host: 192.168.1.12
          keepalived_state: BACKUP
          keepalived_priority: 90
        master-03:
          ansible_host: 192.168.1.13
          keepalived_state: BACKUP
          keepalived_priority: 80

    # Kubernetes 计算节点组 (部署 Containerd 与 Kubelet)
    compute_servers:
      hosts:
        worker-01:
          ansible_host: 192.168.1.31
        worker-02:
          ansible_host: 192.168.1.32

    # 包含所有 Kubernetes 数据及控制面节点（用于统一部署 CRI、网络等）
    kube_node:
      children:
        kube_master:
        compute_servers:

  vars:
    # --- 集群级全局变量定义 ---
    # 负载均衡 VIP 与安全端口 (各组件一律通过 VIP 通信)
    LB_APISERVER_VIP: 192.168.1.100
    LB_APISERVER_PORT: 8443
    LB_INTERFACE: eth0  # Keepalived 绑定的物理网卡名
    
    # 本地集群配置及证书生成缓存目录
    local_cluster_config_dir: "/Users/tommy.xie/work/gopath/src/github.com/k8s/ssl_build"

    # 目标节点架构 (amd64 / arm64)
    target_arch: "amd64"

    # 二进制包统一下载目录 (download role 使用)
    download_dir: "{{ playbook_dir }}/files"
    download_arch_dir: "{{ download_dir }}/{{ target_arch }}"

    # Kubernetes 核心配置
    SERVICE_CIDR: 10.96.0.0/16
    CLUSTER_CIDR: 10.244.0.0/16
    CLUSTER_DNS_SVC_IP: 10.96.0.10
    CLUSTER_DOMAIN: cluster.local

    # API 专属证书 SAN 授权列表 (必须完整覆盖 VIP、Master IP 及内部 Service IP)
    MASTER_CERT_HOSTS:
      - 192.168.1.100
      - 192.168.1.11
      - 192.168.1.12
      - 192.168.1.13
      - 10.96.0.1
      - kubernetes
      - kubernetes.default
      - kubernetes.default.svc
      - kubernetes.default.svc.cluster.local

    # 容器运行时对齐
    CONTAINERD_CGROUP_DRIVER: systemd
    SANDBOX_IMAGE: "registry.k8s.io/pause:3.10.2"
