---
# 0002-common-kubeconfig.yml
# 旗舰级高可用 Kubernetes 二进制部署 - 全局凭证与 Kubeconfig 预生成入口

- name: 全局安全 CA、SA 密钥、etcd 双向 TLS 及组件 Kubeconfig 本地生成
  hosts: localhost
  gather_facts: yes
  vars:
    required_cache_files:
      - "{{ download_arch_dir }}/cfssl"
      - "{{ download_arch_dir }}/cfssljson"
      - "{{ download_arch_dir }}/kubectl"
  pre_tasks:
    - name: 校验本地二进制缓存已准备
      include_role:
        name: preflight_cache
  roles:
    - kubeconfig
