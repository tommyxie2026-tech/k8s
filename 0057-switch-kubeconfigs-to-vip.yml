---
# 0057-switch-kubeconfigs-to-vip.yml
# single-to-ha: 将 kubeconfig server endpoint 切换到 HA VIP。
# 前置条件：0056-enable-ha-lb.yml 已完成，VIP /readyz 正常。

- name: single-to-ha 切换 kubeconfig 到 VIP - 前置检查
  hosts: localhost
  gather_facts: yes
  tasks:
    - name: 确认已显式允许 kubeconfig 切换到 VIP
      assert:
        that:
          - confirm_single_to_ha_migration | default(false) | bool
          - confirm_switch_kubeconfigs_to_vip | default(false) | bool
        fail_msg: "切换 kubeconfig 到 VIP 必须同时传入 -e confirm_single_to_ha_migration=true -e confirm_switch_kubeconfigs_to_vip=true。"
        success_msg: "已确认切换 kubeconfig 到 VIP。"

    - name: 检查迁移模式与 VIP 变量
      assert:
        that:
          - migration_mode | default('') == 'single-to-ha'
          - cluster_mode | default('') == 'ha'
          - node_type | default('') == 'machine'
          - LB_APISERVER_VIP is defined
          - LB_APISERVER_PORT is defined
          - groups['kube_master'] | length == 3
        fail_msg: "kubeconfig 切换要求 single-to-ha/machine/ha 模式，kube_master=3，并定义 LB_APISERVER_VIP/LB_APISERVER_PORT。"
        success_msg: "迁移模式与 VIP 变量检查通过。"

    - name: 设置 VIP apiserver endpoint
      set_fact:
        vip_apiserver_endpoint: "https://{{ LB_APISERVER_VIP }}:{{ LB_APISERVER_PORT }}"

    - name: 验证 VIP apiserver readyz
      uri:
        url: "{{ vip_apiserver_endpoint }}/readyz"
        method: GET
        validate_certs: no
        status_code: 200
      register: vip_readyz_before_switch
      retries: 30
      delay: 5
      until: vip_readyz_before_switch.status == 200

    - name: 检查本地 kubeconfig 目录
      stat:
        path: "{{ local_cluster_config_dir }}/kubeconfig"
      register: local_kubeconfig_dir

    - name: 确认本地 kubeconfig 目录存在
      assert:
        that:
          - local_kubeconfig_dir.stat.exists
          - local_kubeconfig_dir.stat.isdir
        fail_msg: "缺少 {{ local_cluster_config_dir }}/kubeconfig，无法切换 kubeconfig endpoint。"
        success_msg: "本地 kubeconfig 目录存在。"

    - name: 查找本地 kubeconfig 文件
      find:
        paths: "{{ local_cluster_config_dir }}/kubeconfig"
        patterns: "*.kubeconfig"
        file_type: file
      register: local_kubeconfig_files

    - name: 确认至少存在一个 kubeconfig 文件
      assert:
        that:
          - local_kubeconfig_files.matched | int > 0
        fail_msg: "{{ local_cluster_config_dir }}/kubeconfig 下未找到 *.kubeconfig。"
        success_msg: "已找到 kubeconfig 文件。"

- name: single-to-ha 切换 kubeconfig 到 VIP - 本地更新
  hosts: localhost
  gather_facts: yes
  tasks:
    - name: 设置 VIP apiserver endpoint 与备份目录
      set_fact:
        vip_apiserver_endpoint: "https://{{ LB_APISERVER_VIP }}:{{ LB_APISERVER_PORT }}"
        kubeconfig_vip_backup_dir: "{{ playbook_dir }}/backup/single-to-ha/kubeconfig-vip-{{ ansible_date_time.iso8601_basic_short }}"

    - name: 创建 kubeconfig 备份目录
      file:
        path: "{{ kubeconfig_vip_backup_dir }}"
        state: directory
        mode: '0700'

    - name: 备份本地 kubeconfig 目录
      archive:
        path: "{{ local_cluster_config_dir }}/kubeconfig"
        dest: "{{ kubeconfig_vip_backup_dir }}/kubeconfig-before-vip.tgz"
        format: gz
        mode: '0600'

    - name: 查找本地 kubeconfig 文件
      find:
        paths: "{{ local_cluster_config_dir }}/kubeconfig"
        patterns: "*.kubeconfig"
        file_type: file
      register: local_kubeconfig_files_for_replace

    - name: 将 kubeconfig server endpoint 切换为 VIP
      replace:
        path: "{{ item.path }}"
        regexp: 'server: https://[^\n]+'
        replace: "server: {{ vip_apiserver_endpoint }}"
      loop: "{{ local_kubeconfig_files_for_replace.files }}"

    - name: 输出 kubeconfig 备份目录
      debug:
        msg:
          - "kubeconfig backup dir: {{ kubeconfig_vip_backup_dir }}"
          - "VIP endpoint: {{ vip_apiserver_endpoint }}"

    - name: 验证 admin.kubeconfig 通过 VIP 访问 readyz
      command: >
        {{ download_arch_dir }}/kubectl get --raw=/readyz
        --kubeconfig={{ local_cluster_config_dir }}/kubeconfig/admin.kubeconfig
      register: admin_kubeconfig_vip_readyz
      changed_when: false

    - name: 输出 admin.kubeconfig VIP 验证结果
      debug:
        var: admin_kubeconfig_vip_readyz.stdout_lines

- name: single-to-ha 切换 kubeconfig 到 VIP - 分发控制面 kubeconfig
  hosts: kube_master
  gather_facts: no
  become: yes
  tasks:
    - name: 分发 admin kubeconfig 到 root
      copy:
        src: "{{ local_cluster_config_dir }}/kubeconfig/admin.kubeconfig"
        dest: /root/.kube/config
        mode: '0600'

    - name: 分发 controller-manager/scheduler kubeconfig
      copy:
        src: "{{ local_cluster_config_dir }}/kubeconfig/{{ item }}"
        dest: "/etc/kubernetes/{{ item }}"
        mode: '0600'
      loop:
        - kube-controller-manager.kubeconfig
        - kube-scheduler.kubeconfig

    - name: 重启 controller-manager 与 scheduler 以使用 VIP kubeconfig
      systemd:
        name: "{{ item }}"
        state: restarted
        daemon_reload: yes
      loop:
        - kube-controller-manager
        - kube-scheduler
      failed_when: false

- name: single-to-ha 切换 kubeconfig 到 VIP - 分发节点 kubeconfig
  hosts: kube_node
  gather_facts: no
  become: yes
  tasks:
    - name: 检查 kubelet kubeconfig 是否存在于本地生成目录
      stat:
        path: "{{ local_cluster_config_dir }}/kubeconfig/{{ item }}"
      loop:
        - bootstrap.kubeconfig
        - kubelet.kubeconfig
        - kube-proxy.kubeconfig
      register: node_kubeconfig_local_stats
      delegate_to: localhost
      run_once: true

    - name: 分发存在的节点 kubeconfig
      copy:
        src: "{{ local_cluster_config_dir }}/kubeconfig/{{ item.item }}"
        dest: "/etc/kubernetes/{{ item.item }}"
        mode: '0600'
      loop: "{{ node_kubeconfig_local_stats.results }}"
      when: item.stat.exists

    - name: 重启 kubelet 与 kube-proxy 以使用 VIP kubeconfig
      systemd:
        name: "{{ item }}"
        state: restarted
        daemon_reload: yes
      loop:
        - kubelet
        - kube-proxy
      failed_when: false

- name: single-to-ha 切换 kubeconfig 到 VIP - 最终验证
  hosts: localhost
  gather_facts: no
  tasks:
    - name: 检查 kubectl get nodes
      command: >
        {{ download_arch_dir }}/kubectl get nodes -o wide
        --kubeconfig={{ local_cluster_config_dir }}/kubeconfig/admin.kubeconfig
      register: vip_kubeconfig_nodes
      changed_when: false

    - name: 检查 kubectl get pods -A
      command: >
        {{ download_arch_dir }}/kubectl get pods -A -o wide
        --kubeconfig={{ local_cluster_config_dir }}/kubeconfig/admin.kubeconfig
      register: vip_kubeconfig_pods
      changed_when: false

    - name: 输出最终验证结果
      debug:
        msg:
          - "kubeconfig has been switched to VIP."
          - "nodes:"
          - "{{ vip_kubeconfig_nodes.stdout_lines }}"
          - "pods:"
          - "{{ vip_kubeconfig_pods.stdout_lines }}"
