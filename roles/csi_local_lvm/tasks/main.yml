---
# Initial local-lvm CSI installation role.
# Current phase deploys a minimal TopoLVM baseline.

- name: local-lvm preflight assertions
  assert:
    that:
      - storage_backend == 'local-lvm'
    fail_msg: "csi_local_lvm role only supports storage_backend=local-lvm"

- name: Show local-lvm configuration
  debug:
    msg:
      - "local_lvm_vg_name={{ local_lvm_vg_name }}"
      - "local_lvm_storage_class={{ local_lvm_storage_class }}"
      - "No disk formatting will be executed automatically"

- name: Install lvm2
  package:
    name: lvm2
    state: present
  become: true

- name: Create topolvm config directory
  file:
    path: "{{ local_lvm_lvmd_config_dir }}"
    state: directory
    mode: '0755'
  become: true

- name: Render lvmd config
  template:
    src: lvmd.yaml.j2
    dest: "{{ local_lvm_lvmd_config_file }}"
    mode: '0644'
  become: true

- name: Check VG existence
  shell: vgs {{ local_lvm_vg_name }}
  register: vg_check
  changed_when: false
  failed_when: false
  become: true

- name: Show VG result
  debug:
    msg:
      - "vg_exists_rc={{ vg_check.rc }}"
      - "local_lvm_create_vg={{ local_lvm_create_vg }}"

- name: Render TopoLVM manifests
  template:
    src: topolvm-manifests.yaml.j2
    dest: /tmp/topolvm-manifests.yaml
    mode: '0644'

- name: Apply TopoLVM manifests
  command: >
    {{ download_arch_dir }}/kubectl apply -f /tmp/topolvm-manifests.yaml
    --kubeconfig={{ local_cluster_config_dir }}/kubeconfig/admin.kubeconfig
  register: topolvm_apply
  changed_when: false

- name: Show apply result
  debug:
    var: topolvm_apply.stdout_lines

- name: Wait for TopoLVM controller rollout
  command: >
    {{ download_arch_dir }}/kubectl -n {{ local_lvm_namespace }}
    rollout status deployment/topolvm-controller --timeout=120s
    --kubeconfig={{ local_cluster_config_dir }}/kubeconfig/admin.kubeconfig
  register: topolvm_rollout
  changed_when: false
  failed_when: false

- name: Show rollout result
  debug:
    var: topolvm_rollout.stdout_lines
