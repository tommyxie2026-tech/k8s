---
# roles/cni/defaults/main.yml

cni_plugins_version: "1.9.1"
calico_version: "3.32.0"
coredns_version: "1.14.3"
coredns_replicas: 2
coredns_image: "coredns/coredns"

kube_proxy_deploy_mode: "daemonset"
kube_proxy_image: "registry.k8s.io/kube-proxy"
kube_proxy_proxy_mode: "ipvs"
kube_proxy_ipvs_scheduler: "rr"
kube_proxy_healthz_port: 10256
kube_proxy_metrics_port: 10249
