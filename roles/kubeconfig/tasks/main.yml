  run_once: true

- name: 12. 签发 kube-controller-manager 证书
  shell: |
    {{ download_arch_dir }}/cfssl gencert -ca=ca.pem -ca-key=ca-key.pem -config=ca-config.json -profile=kubernetes kube-controller-manager-csr.json | {{ download_arch_dir }}/cfssljson -bare kube-controller-manager
  args:
    chdir: "{{ local_cluster_config_dir }}/ssl"
    creates: "{{ local_cluster_config_dir }}/ssl/kube-controller-manager.pem"
  delegate_to: localhost
  run_once: true

- name: 13. 渲染 kube-scheduler 证书 CSR
  copy:
    content: |
      {
        "CN": "system:kube-scheduler",
        "key": {
          "algo": "{{ cert_key_algo }}",
          "size": {{ cert_key_size }}
        },
        "names": [
          {
            "C": "{{ cert_subject.C }}",
            "ST": "{{ cert_subject.ST }}",
            "L": "{{ cert_subject.L }}",
            "O": "system:kube-scheduler",
            "OU": "{{ cert_subject.OU }}"
          }
        ]
      }
    dest: "{{ local_cluster_config_dir }}/ssl/kube-scheduler-csr.json"
    mode: '0644'
