  run_once: true

- name: 14. 签发 kube-scheduler 证书
  shell: |
    {{ download_arch_dir }}/cfssl gencert -ca=ca.pem -ca-key=ca-key.pem -config=ca-config.json -profile=kubernetes kube-scheduler-csr.json | {{ download_arch_dir }}/cfssljson -bare kube-scheduler
  args:
    chdir: "{{ local_cluster_config_dir }}/ssl"
    creates: "{{ local_cluster_config_dir }}/ssl/kube-scheduler.pem"
  delegate_to: localhost
  run_once: true

- name: 15. 渲染 admin 证书 CSR
  copy:
    content: |
      {
        "CN": "admin",
        "key": {
          "algo": "{{ cert_key_algo }}",
          "size": {{ cert_key_size }}
        },
        "names": [
          {
            "C": "{{ cert_subject.C }}",
            "ST": "{{ cert_subject.ST }}",
            "L": "{{ cert_subject.L }}",
            "O": "system:masters",
            "OU": "{{ cert_subject.OU }}"
          }
        ]
      }
    dest: "{{ local_cluster_config_dir }}/ssl/admin-csr.json"
    mode: '0644'
  delegate_to: localhost
  run_once: true

- name: 16. 签发 admin 证书
  shell: |
    {{ download_arch_dir }}/cfssl gencert -ca=ca.pem -ca-key=ca-key.pem -config=ca-config.json -profile=kubernetes admin-csr.json | {{ download_arch_dir }}/cfssljson -bare admin
  args:
    chdir: "{{ local_cluster_config_dir }}/ssl"
    creates: "{{ local_cluster_config_dir }}/ssl/admin.pem"
  delegate_to: localhost
  run_once: true

- name: 17. 生成各核心组件 Kubeconfig
  shell: |
    {{ download_arch_dir }}/kubectl config set-cluster kubernetes \
      --certificate-authority=ca.pem \
      --embed-certs=true \
      --server=https://{{ LB_APISERVER_VIP }}:{{ LB_APISERVER_PORT }} \
      --kubeconfig=../kubeconfig/{{ item.name }}.kubeconfig

    {{ download_arch_dir }}/kubectl config set-credentials {{ item.user }} \
      --client-certificate={{ item.name }}.pem \
      --client-key={{ item.name }}-key.pem \
      --embed-certs=true \
      --kubeconfig=../kubeconfig/{{ item.name }}.kubeconfig

    {{ download_arch_dir }}/kubectl config set-context default \
      --cluster=kubernetes \
      --user={{ item.user }} \
      --kubeconfig=../kubeconfig/{{ item.name }}.kubeconfig

    {{ download_arch_dir }}/kubectl config use-context default \
      --kubeconfig=../kubeconfig/{{ item.name }}.kubeconfig
  args:
    chdir: "{{ local_cluster_config_dir }}/ssl"
    creates: "{{ local_cluster_config_dir }}/kubeconfig/{{ item.name }}.kubeconfig"
  delegate_to: localhost
  run_once: true
  with_items:
    - { name: "kube-proxy", user: "system:kube-proxy" }
    - { name: "kube-controller-manager", user: "system:kube-controller-manager" }
    - { name: "kube-scheduler", user: "system:kube-scheduler" }
    - { name: "admin", user: "admin" }
