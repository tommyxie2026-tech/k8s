---
- name: Validate NFS backend
  assert:
    that:
      - storage_backend == 'nfs'
      - nfs_server | length > 0
      - nfs_path | length > 0

- name: Render NFS CSI manifests
  template:
    src: nfs-provisioner.yaml.j2
    dest: /tmp/nfs-csi.yaml
    mode: '0644'

- name: Apply NFS CSI manifests
  command: >
    {{ download_arch_dir }}/kubectl apply -f /tmp/nfs-csi.yaml
    --kubeconfig={{ local_cluster_config_dir }}/kubeconfig/admin.kubeconfig
  register: nfs_apply
  changed_when: false

- name: Show NFS apply result
  debug:
    var: nfs_apply.stdout_lines

- name: Wait for NFS provisioner rollout
  command: >
    {{ download_arch_dir }}/kubectl -n {{ nfs_namespace }}
    rollout status deployment/nfs-client-provisioner --timeout=120s
    --kubeconfig={{ local_cluster_config_dir }}/kubeconfig/admin.kubeconfig
  register: nfs_rollout
  changed_when: false
  failed_when: false

- name: Show NFS rollout result
  debug:
    var: nfs_rollout.stdout_lines
