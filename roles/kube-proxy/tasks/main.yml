---
# roles/kube-proxy/tasks/main.yml

- name: 1. 分发 Kubernetes 节点二进制包至节点
  copy:
    src: "{{ download_arch_dir }}/kubernetes-node-linux-{{ target_arch }}.tar.gz"
    dest: /tmp/k8s-node.tar.gz
    mode: '0644'

- name: 2. 安装 kube-proxy 二进制文件
  shell: |
    tar -zxf /tmp/k8s-node.tar.gz -C /tmp
    cp /tmp/kubernetes/node/bin/kube-proxy /usr/local/bin/
    chmod +x /usr/local/bin/kube-proxy
  args:
    creates: /usr/local/bin/kube-proxy
  changed_when: true

- name: 3. 创建 kube-proxy 工作目录
  file:
    path: /var/lib/kube-proxy
    state: directory
    mode: '0755'

- name: 4. 分发 kube-proxy kubeconfig
  copy:
    src: "{{ local_cluster_config_dir }}/kubeconfig/kube-proxy.kubeconfig"
    dest: /etc/kubernetes/kube-proxy.kubeconfig
    mode: '0600'

- name: 5. 渲染 kube-proxy 配置文件
  template:
    src: kube-proxy-config.yaml.j2
    dest: /var/lib/kube-proxy/config.yaml
    mode: '0644'
  notify: kube-proxy config changed

- name: 6. 渲染 kube-proxy systemd 服务
  template:
    src: kube-proxy.service.j2
    dest: /etc/systemd/system/kube-proxy.service
    mode: '0644'
  notify: kube-proxy config changed

- name: 7. 启动并守护 kube-proxy 服务
  systemd:
    name: kube-proxy
    state: started
    enabled: yes
    daemon_reload: yes
