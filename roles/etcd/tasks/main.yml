---
# roles/etcd/tasks/main.yml

- name: 1. 创建 etcd 证书及数据存储目录
  file:
    path: "{{ item }}"
    state: directory
    mode: '0700'
  with_items:
    - "{{ etcd_ssl_dir }}"
    - "{{ etcd_data_dir }}"

- name: 2. 分发根 CA 至 etcd 节点
  copy:
    src: "{{ local_cluster_config_dir }}/ssl/ca.pem"
    dest: "{{ etcd_ssl_dir }}/ca.pem"
    mode: '0600'

- name: 3. 在本地签发该 etcd 节点证书
  shell: |
    echo '{"CN":"{{ inventory_hostname }}","hosts":["127.0.0.1","{{ ansible_host }}"],"key":{"algo":"{{ cert_key_algo }}","size":{{ cert_key_size }}},"names":[{"C":"{{ cert_subject.C }}","ST":"{{ cert_subject.ST }}","L":"{{ cert_subject.L }}","O":"{{ cert_subject.O }}","OU":"{{ cert_subject.OU }}"}]}' > {{ inventory_hostname }}-csr.json
    {{ download_arch_dir }}/cfssl gencert -ca=ca.pem -ca-key=ca-key.pem -config=ca-config.json -profile=kubernetes {{ inventory_hostname }}-csr.json | {{ download_arch_dir }}/cfssljson -bare {{ inventory_hostname }}
  args:
    chdir: "{{ local_cluster_config_dir }}/ssl"
    creates: "{{ local_cluster_config_dir }}/ssl/{{ inventory_hostname }}.pem"
  delegate_to: localhost
  run_once: false

- name: 4. 分发 etcd 证书至节点
  copy:
    src: "{{ local_cluster_config_dir }}/ssl/{{ item.src }}"
    dest: "{{ etcd_ssl_dir }}/{{ item.dest }}"
    mode: '0600'
  with_items:
    - { src: "{{ inventory_hostname }}.pem", dest: "etcd.pem" }
    - { src: "{{ inventory_hostname }}-key.pem", dest: "etcd-key.pem" }

- name: 5. 分发 etcd 二进制包至节点
  copy:
    src: "{{ download_arch_dir }}/etcd-v{{ etcd_version }}-linux-{{ target_arch }}.tar.gz"
    dest: /tmp/etcd.tar.gz
    mode: '0644'

- name: 6. 解压并安装 etcd 二进制文件
  shell: |
    tar -zxf /tmp/etcd.tar.gz -C /tmp
    cp /tmp/etcd-v{{ etcd_version }}-linux-{{ target_arch }}/etcd* /usr/local/bin/
    chmod +x /usr/local/bin/etcd*
  args:
    creates: /usr/local/bin/etcd
  changed_when: true

- name: 7. 渲染 etcd systemd 服务配置
  template:
    src: etcd.service.j2
    dest: /etc/systemd/system/etcd.service
    mode: '0644'
  notify: etcd config changed

- name: 8. 启动并守护 etcd 服务
  systemd:
    name: etcd
    state: started
    enabled: yes
    daemon_reload: yes

- name: 9. 校验 etcd 集群健康状态
  command: >
    /usr/local/bin/etcdctl
    --cacert={{ etcd_ssl_dir }}/ca.pem
    --cert={{ etcd_ssl_dir }}/etcd.pem
    --key={{ etcd_ssl_dir }}/etcd-key.pem
    --endpoints=https://{{ ansible_host }}:{{ etcd_client_port }}
    endpoint health
  environment:
    ETCDCTL_API: 3
  register: etcd_health
  until: etcd_health.rc == 0
  retries: 10
  delay: 3
