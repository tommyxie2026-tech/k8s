---
# Enterprise iSCSI SAN CSI defaults.
# This role provides a safe framework for SAN-backed CSI integration.
# It does not create or delete external SAN LUNs.

iscsi_namespace: iscsi-csi-system
iscsi_storage_class: iscsi-san
iscsi_csi_driver_name: iscsi.csi.k8s.io
iscsi_csi_manifest_enabled: false
iscsi_csi_manifest_src: ""
iscsi_csi_manifest_dest: /tmp/iscsi-csi.yaml
iscsi_target_portals: []
iscsi_iqn: ""
iscsi_chap_enabled: true
iscsi_chap_username: ""
iscsi_chap_password: ""
iscsi_multipath_enabled: true
iscsi_fs_type: xfs
iscsi_reclaim_policy: Retain
