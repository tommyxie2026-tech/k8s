name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  version-consistency:
    name: Version consistency check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Check source and deploy versions
        run: python scripts/check-version-consistency.py

  ansible-syntax-container:
    name: Ansible syntax checks - container inventory
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Ansible and collections
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core
          ansible-galaxy collection install -r requirements.yml

      - name: Show Ansible version
        run: ansible --version

      - name: Syntax check playbooks with container inventory
        run: INVENTORY=inventories/hosts-container.yml bash scripts/syntax-check.sh

  ansible-syntax-single:
    name: Ansible syntax checks - single-node inventory
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Ansible and collections
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core
          ansible-galaxy collection install -r requirements.yml

      - name: Show Ansible version
        run: ansible --version

      - name: Syntax check playbooks with single-node inventory
        run: INVENTORY=inventories/hosts-single.yml bash scripts/syntax-check.sh
