name: platform-api-ci

on:
  pull_request:
    paths:
      - "platform-api/**"
      - ".github/workflows/platform-api-ci.yml"
  push:
    branches: [master]
    paths:
      - "platform-api/**"
      - ".github/workflows/platform-api-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: platform-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            platform-api/requirements.txt
            platform-api/requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check app tests

      - name: Mypy
        run: mypy app

      - name: Pytest
        run: pytest
