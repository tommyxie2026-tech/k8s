name: Cache default binaries

on:
  workflow_dispatch:
    inputs:
      arch:
        description: Target architecture, e.g. amd64 or arm64
        required: true
        default: amd64
      target_branch:
        description: Branch to store binary cache
        required: true
        default: binary-cache/amd64
      commit_changes:
        description: Commit downloaded files back to repository
        required: true
        default: 'true'

permissions:
  contents: write

jobs:
  cache-default-binaries:
    name: Download and commit default binaries
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Configure Git LFS
        run: |
          git lfs install
          git lfs track "files/**/*"

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Download default binaries from source branch
        env:
          ARCH: ${{ inputs.arch }}
        run: bash scripts/download-default-binaries.sh

      - name: Show cached files
        run: |
          find "files/${{ inputs.arch }}" -maxdepth 1 -type f -printf '%p %s bytes\n' | sort

      - name: Prepare binary cache branch
        if: ${{ inputs.commit_changes == 'true' }}
        run: |
          set -euo pipefail
          TARGET_BRANCH="${{ inputs.target_branch }}"
          if git ls-remote --exit-code --heads origin "${TARGET_BRANCH}" >/dev/null 2>&1; then
            git fetch origin "${TARGET_BRANCH}"
            git checkout -B "${TARGET_BRANCH}" "origin/${TARGET_BRANCH}"
          else
            git checkout --orphan "${TARGET_BRANCH}"
            git rm -rf . || true
            git checkout "${{ github.sha }}" -- .gitattributes scripts/download-default-binaries.sh || true
          fi

      - name: Copy downloaded cache into cache branch
        if: ${{ inputs.commit_changes == 'true' }}
        run: |
          set -euo pipefail
          ARCH="${{ inputs.arch }}"
          TMP_CACHE="$(mktemp -d)"
          cp -a "files/${ARCH}" "${TMP_CACHE}/"
          mkdir -p files
          rm -rf "files/${ARCH}"
          cp -a "${TMP_CACHE}/${ARCH}" "files/${ARCH}"
          rm -rf "${TMP_CACHE}"

      - name: Commit binary cache
        if: ${{ inputs.commit_changes == 'true' }}
        run: |
          set -euo pipefail
          TARGET_BRANCH="${{ inputs.target_branch }}"
          git add .gitattributes "files/${{ inputs.arch }}"
          if git diff --cached --quiet; then
            echo "No binary cache changes to commit."
          else
            git commit -m "cache: update default ${{ inputs.arch }} binaries"
            if ! git push origin "HEAD:${TARGET_BRANCH}"; then
              echo "::error::Failed to push ${TARGET_BRANCH}. Check repository Actions write permission and branch protection rules, or run again with a new target_branch such as binary-cache/${{ inputs.arch }}-${{ github.run_number }}."
              exit 1
            fi
          fi
