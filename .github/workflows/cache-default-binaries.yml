name: Cache default binaries

on:
  workflow_dispatch:
    inputs:
      arch:
        description: Target architecture, e.g. amd64 or arm64
        required: true
        default: amd64
      target_branch:
        description: Branch to store binary cache
        required: true
        default: binary-cache/amd64
      commit_changes:
        description: Commit downloaded files back to repository
        required: true
        default: 'true'

permissions:
  contents: write

jobs:
  cache-default-binaries:
    name: Download and commit default binaries
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Configure Git LFS
        run: |
          git lfs install
          git lfs track "files/**/*"

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Download default binaries from source branch
        env:
          ARCH: ${{ inputs.arch }}
        run: bash scripts/download-default-binaries.sh

      - name: Show cached files
        run: |
          find "files/${{ inputs.arch }}" -maxdepth 1 -type f -printf '%p %s bytes\n' | sort

      - name: Switch to binary cache branch
        if: ${{ inputs.commit_changes == 'true' }}
        run: |
          set -euo pipefail
          TARGET_BRANCH="${{ inputs.target_branch }}"
          git checkout -B "${TARGET_BRANCH}"

      - name: Commit binary cache
        if: ${{ inputs.commit_changes == 'true' }}
        run: |
          set -euo pipefail
          TARGET_BRANCH="${{ inputs.target_branch }}"
          git add .gitattributes "files/${{ inputs.arch }}"
          if git diff --cached --quiet; then
            echo "No binary cache changes to commit."
          else
            git commit -m "cache: update default ${{ inputs.arch }} binaries"
            git push --force-with-lease origin "HEAD:${TARGET_BRANCH}"
          fi
